name: VIGIL Daily Intel Scan

on:
  schedule:
    # Two schedules for DST (matching DAINS pattern)
    # Winter (GMT): 06:17 UTC = ~6:17am Dublin
    # Summer (IST): 07:17 UTC = ~6:17am Dublin (after DAINS runs at 6/7am)
    - cron: '17 6 * * *'
    - cron: '17 7 * * *'

  workflow_dispatch:
    inputs:
      force:
        description: 'Force regenerate even if scan exists'
        required: false
        default: false
        type: boolean

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vigil-intel/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: vigil-intel

      - name: Run VIGIL intel scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node build-intel.js ${{ inputs.force == true && '--force' || '' }}
        working-directory: vigil-intel
